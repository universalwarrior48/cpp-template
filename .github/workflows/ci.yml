name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  job:
    name: ${{ matrix.preset }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            preset: linux-gcc-release
          - os: ubuntu-latest
            preset: linux-clang-release
          - os: windows-latest
            preset: msvc-release
          - os: windows-latest
            preset: clang-cl-release

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgJsonGlob: 'vcpkg.json'

      - name: Install Ninja & Tools (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: Configure CMake
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }} --parallel

      - name: Test
        run: ctest --preset ${{ matrix.preset }} --output-on-failure

  # --- Code Quality & Sanitizers ---
  analysis:
    name: Analysis (Clang-Tidy & ASan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build clang clang-tidy libgtest-dev libbenchmark-dev
      
      - name: Configure & Build
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DENABLE_SANITIZERS=ON \
            -DENABLE_CLANG_TIDY=ON
          cmake --build build --parallel
          
      - name: Run Tests
        run: ctest --test-dir build --output-on-failure