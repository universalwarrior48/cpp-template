name: CI

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  job:
    name: ${{ matrix.preset }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            preset: linux-gcc-release
          - os: ubuntu-latest
            preset: linux-clang-release
          - os: windows-latest
            preset: msvc-release
          - os: windows-latest
            preset: clang-cl-release

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgJsonGlob: 'vcpkg.json'

      - name: Install Ninja (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build

      - name: Set up MSVC (Windows)
        # This is the critical fix for the link.exe error
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure CMake
        shell: bash
        run: |
          cmake --preset ${{ matrix.preset }} \
            -DCMAKE_TOOLCHAIN_FILE="${VCPKG_ROOT}/scripts/buildsystems/vcpkg.cmake"

      - name: Build (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          # Split by the last hyphen to handle names like linux-clang-release
          PRESET="${{ matrix.preset }}"
          BASE_PRESET="${PRESET%-*}"
          CONFIG="${PRESET##*-}"
          bash ./scripts/build.sh "$BASE_PRESET" "$CONFIG"

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          @echo off
          for /f "tokens=1,2,3 delims=-" %%a in ("${{ matrix.preset }}") do (
              if "%%c"=="" (
                  call scripts\build.bat %%a %%b
              ) else (
                  call scripts\build.bat %%a-%%b %%c
              )
          )

  analysis:
    name: Analysis (Clang-Tidy & ASan)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgJsonGlob: 'vcpkg.json'

      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build clang clang-tidy

      - name: Configure & Build
        shell: bash
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DENABLE_SANITIZERS=ON \
            -DENABLE_CLANG_TIDY=OFF \
            -DCMAKE_TOOLCHAIN_FILE="${VCPKG_ROOT}/scripts/buildsystems/vcpkg.cmake"
          cmake --build build --parallel
          
      - name: Run Tests
        shell: bash
        run: ctest --test-dir build --output-on-failure